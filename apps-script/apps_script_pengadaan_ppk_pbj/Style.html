<style>
  body { font-family: Arial, sans-serif; margin: 0; color: #1f2937; background: #f8fafc; }
  .wrap { padding: 20px; }
  h2 { margin: 0 0 8px; font-size: 20px; color: #0f172a; }
  .muted { color: #64748b; font-size: 13px; line-height: 1.5; }

  button:disabled { opacity: .6; cursor: not-allowed; }
  .message { margin-top: 14px; padding: 12px; border-radius: 8px; background: #e0f2fe; font-size: 13px; line-height: 1.5; }

  .message.success { background: #dcfce7; color: #14532d; }

  a { color: #1d4ed8; }
</style>
